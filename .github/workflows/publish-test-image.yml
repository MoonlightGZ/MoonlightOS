name: Publish Test Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish test image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install BlueBuild
        shell: bash
        run: |
          set -euo pipefail
          docker run --pull always --rm ghcr.io/blue-build/cli:latest-installer | sudo bash
          bluebuild --version

      - name: Generate unsigned test Containerfile
        shell: bash
        run: |
          set -euo pipefail
          bluebuild generate recipes/recipe.yml -o Containerfile
          awk 'BEGIN { skip=0 }
            /^# Key RUN$/ {
              print "# Key RUN skipped for unsigned temporary test image"
              skip=1
              next
            }
            /^# Bin RUN$/ {
              skip=0
              print
              next
            }
            skip==0 { print }
          ' Containerfile > Containerfile.unsigned
          grep '^image-version:' recipes/recipe.yml

      - name: Build and push test image
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker buildx build \
            --push \
            --platform linux/amd64 \
            --tag ghcr.io/moonlightgz/moonlightos:first-build-test \
            --file Containerfile.unsigned \
            .

      - name: Verify published image
        shell: bash
        run: |
          set -euo pipefail
          docker manifest inspect ghcr.io/moonlightgz/moonlightos:first-build-test >/dev/null
          echo "Published ghcr.io/moonlightgz/moonlightos:first-build-test"
