name: Publish Test Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and publish test image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install BlueBuild
        shell: bash
        run: |
          set -euo pipefail
          docker run --pull always --rm ghcr.io/blue-build/cli:latest-installer | sudo bash
          bluebuild --version

      - name: Set temporary output image tag
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          recipe = Path("recipes/recipe.yml")
          lines = recipe.read_text(encoding="utf-8").splitlines()
          output = []
          inserted = False

          for line in lines:
              if not inserted and line.startswith("base-image:"):
                  output.extend(["alt-tags:", "  - first-build-test"])
                  inserted = True
              output.append(line)

          if not inserted:
              raise SystemExit("Could not find base-image in recipes/recipe.yml")

          recipe.write_text("\n".join(output) + "\n", encoding="utf-8")
          PY
          grep -A2 '^alt-tags:' recipes/recipe.yml
          grep '^image-version:' recipes/recipe.yml

      - name: Build and push test image
        shell: bash
        env:
          BB_USERNAME: ${{ github.actor }}
          BB_PASSWORD: ${{ github.token }}
        run: |
          set -euo pipefail
          bluebuild build \
            --push \
            --no-sign \
            --registry ghcr.io \
            --registry-namespace moonlightgz \
            recipes/recipe.yml

      - name: Verify published image
        shell: bash
        run: |
          set -euo pipefail
          docker manifest inspect ghcr.io/moonlightgz/moonlightos:first-build-test >/dev/null
          echo "Published ghcr.io/moonlightgz/moonlightos:first-build-test"
